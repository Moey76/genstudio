<!doctype html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AI Studio Flow</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>body{background:#0a0a0a}</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-presets="react">
const { useState, useRef, useEffect } = React;

function App() {
  const [videoTitle, setVideoTitle] = useState('');
  const [apiKey, setApiKey] = useState(() => localStorage.getItem('anthropic_key') || '');
  const [showKeyInput, setShowKeyInput] = useState(false);

  const [orientation, setOrientation] = useState('Vertical');
  const [resolution, setResolution] = useState('1080x1920');
  const [fps, setFps] = useState('30');
  const [duration, setDuration] = useState(6);

  const [resultType, setResultType] = useState('prompt');
  const [generatedPrompt, setGeneratedPrompt] = useState('');
  const [videoUrl, setVideoUrl] = useState(null);
  const [actualMime, setActualMime] = useState('');
  const [isGenerating, setIsGenerating] = useState(false);
  const [loadingText, setLoadingText] = useState('');
  const [errorText, setErrorText] = useState('');
  const [isCopied, setIsCopied] = useState(false);

  const resolutions = {
    Horizontal: ['1920x1080', '3840x2160'],
    Vertical: ['1080x1920', '2160x3840'],
    Square: ['1080x1080', '2160x2160']
  };
  const fpsOptions = ['24', '30', '60'];

  useEffect(() => {
    localStorage.setItem('anthropic_key', apiKey);
  }, [apiKey]);

  const handleOrientationChange = (ori) => {
    setOrientation(ori);
    setResolution(resolutions[ori][0]);
  };

  const getAspectClass = () => {
    if (orientation === 'Horizontal') return 'aspect-video w-full';
    if (orientation === 'Vertical') return 'aspect-[9/16] w-60 mx-auto';
    return 'aspect-square w-72 mx-auto';
  };

  // ---------- Generate Prompt: panggil Claude langsung dari browser ----------
  const handleGeneratePrompt = async () => {
    if (!apiKey) {
      setShowKeyInput(true);
      setErrorText('Isi dulu API Key Anthropic kamu di atas.');
      return;
    }
    setIsGenerating(true);
    setResultType('prompt');
    setGeneratedPrompt('');
    setErrorText('');
    setLoadingText('Menghubungi Claude...');

    const subject = videoTitle || 'karakter epik 3D';
    const ar = orientation === 'Horizontal' ? '16:9' : orientation === 'Vertical' ? '9:16' : '1:1';

    try {
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': apiKey,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true'
        },
        body: JSON.stringify({
          model: 'claude-sonnet-4-6',
          max_tokens: 700,
          messages: [{
            role: 'user',
            content: `Buatkan satu master prompt sinematik detail untuk AI video generator, subjek: "${subject}". Orientasi ${orientation}, resolusi ${resolution} @ ${fps}fps, aspect ratio ${ar}, green screen studio siap VFX. Gaya prompt Midjourney/Runway. Balas HANYA teks promptnya, tanpa basa-basi.`
          }]
        })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error?.message || 'Gagal memanggil Anthropic API.');
      const text = (data.content || []).map(b => b.text || '').join('\n').trim();
      setGeneratedPrompt(text);
    } catch (err) {
      setErrorText(err.message);
    } finally {
      setIsGenerating(false);
      setLoadingText('');
    }
  };

  // ---------- Generate Video: render nyata di browser (canvas + MediaRecorder) ----------
  const wrapText = (ctx, text, x, y, maxWidth, lineHeight) => {
    const words = text.split(' ');
    let line = '', lines = [];
    for (let n = 0; n < words.length; n++) {
      const test = line + words[n] + ' ';
      if (ctx.measureText(test).width > maxWidth && n > 0) { lines.push(line); line = words[n] + ' '; }
      else line = test;
    }
    lines.push(line);
    const totalH = lines.length * lineHeight;
    lines.forEach((l, i) => ctx.fillText(l.trim(), x, y - totalH / 2 + lineHeight * (i + 0.5)));
  };

  const drawFrame = (ctx, w, h, t, totalT, title) => {
    const progress = Math.min(1, t / totalT);
    const hue1 = (t * 40) % 360, hue2 = (hue1 + 120) % 360;
    const grad = ctx.createLinearGradient(0, 0, w, h);
    grad.addColorStop(0, `hsl(${hue1},70%,18%)`);
    grad.addColorStop(1, `hsl(${hue2},70%,8%)`);
    ctx.fillStyle = grad; ctx.fillRect(0, 0, w, h);
    for (let i = 0; i < 45; i++) {
      const seed = i * 97.13;
      const x = (Math.sin(seed + t * 0.5) * 0.5 + 0.5) * w;
      const y = (((seed * 13) % 1000) / 1000 + t * 0.05 * ((i % 3) + 1)) % 1 * h;
      ctx.beginPath();
      ctx.fillStyle = `hsla(${(hue1 + i * 10) % 360},80%,70%,0.55)`;
      ctx.arc(x, y, 2 + (i % 5), 0, Math.PI * 2);
      ctx.fill();
    }
    const scale = Math.min(1, progress * 4);
    ctx.save();
    ctx.translate(w / 2, h / 2);
    ctx.scale(scale, scale);
    ctx.globalAlpha = Math.min(1, progress * 3);
    ctx.fillStyle = '#fff';
    ctx.font = `bold ${Math.floor(w * 0.06)}px sans-serif`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    wrapText(ctx, title, 0, 0, w * 0.8, w * 0.07);
    ctx.restore();
    ctx.globalAlpha = 1;
    ctx.fillStyle = 'rgba(255,255,255,0.45)';
    ctx.font = `${Math.floor(w * 0.02)}px monospace`;
    ctx.textAlign = 'right';
    ctx.fillText('AI STUDIO FLOW', w - w * 0.02, h - w * 0.02);
  };

  const pickMimeType = () => {
    if (!window.MediaRecorder) return '';
    const candidates = ['video/mp4;codecs=avc1.42E01E', 'video/mp4', 'video/webm;codecs=vp9', 'video/webm'];
    for (const c of candidates) { try { if (MediaRecorder.isTypeSupported(c)) return c; } catch (e) {} }
    return '';
  };

  const handleGenerateVideo = async () => {
    setIsGenerating(true);
    setResultType('video');
    setVideoUrl(null);
    setErrorText('');
    setLoadingText('Menyiapkan render engine...');

    const [wStr, hStr] = resolution.split('x');
    const width = parseInt(wStr, 10), height = parseInt(hStr, 10);
    const frameRate = Math.max(1, Math.round(parseFloat(fps)) || 30);

    const canvas = document.createElement('canvas');
    canvas.width = width; canvas.height = height;
    const ctx = canvas.getContext('2d');

    if (!canvas.captureStream) { setErrorText('Browser tidak mendukung capture video.'); setIsGenerating(false); return; }
    const mimeType = pickMimeType();
    if (!mimeType) { setErrorText('MediaRecorder tidak didukung browser ini.'); setIsGenerating(false); return; }
    setActualMime(mimeType);

    const stream = canvas.captureStream(frameRate);
    const chunks = [];
    const recorder = new MediaRecorder(stream, { mimeType });
    recorder.ondataavailable = (e) => { if (e.data.size > 0) chunks.push(e.data); };
    const donePromise = new Promise((resolve) => { recorder.onstop = resolve; });

    const title = videoTitle || 'AI Generated Scene';
    const start = performance.now();
    recorder.start();

    const loop = () => {
      const elapsed = (performance.now() - start) / 1000;
      drawFrame(ctx, width, height, elapsed, duration, title);
      setLoadingText(`Merender ${resolution} @ ${fps}fps... ${Math.min(elapsed, duration).toFixed(1)}s / ${duration}s`);
      if (elapsed < duration) requestAnimationFrame(loop);
      else recorder.stop();
    };
    requestAnimationFrame(loop);

    await donePromise;
    const blob = new Blob(chunks, { type: mimeType });
    setVideoUrl(URL.createObjectURL(blob));
    setIsGenerating(false);
    setLoadingText('');
  };

  const handleDownload = () => {
    if (resultType === 'video') {
      if (!videoUrl) return;
      const ext = actualMime.includes('mp4') ? 'mp4' : 'webm';
      const a = document.createElement('a');
      a.href = videoUrl;
      a.download = `${videoTitle ? videoTitle.replace(/\s+/g, '_') : 'AI_Gen'}.${ext}`;
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
    } else {
      if (!generatedPrompt) return;
      const el = document.createElement('a');
      el.href = URL.createObjectURL(new Blob([generatedPrompt], { type: 'text/plain' }));
      el.download = `${videoTitle ? videoTitle.replace(/\s+/g, '_') : 'AI_Gen'}_Prompt.txt`;
      document.body.appendChild(el); el.click(); document.body.removeChild(el);
    }
  };

  const handleCopy = () => {
    navigator.clipboard.writeText(generatedPrompt);
    setIsCopied(true);
    setTimeout(() => setIsCopied(false), 2000);
  };

  const hasResult = resultType === 'video' ? videoUrl : generatedPrompt;

  return (
    <div className="min-h-screen bg-neutral-950 text-neutral-200 p-4 sm:p-6">
      <div className="max-w-2xl mx-auto space-y-5">

        <div className="border-b border-neutral-800 pb-4">
          <h1 className="text-xl font-bold text-white">AI Studio Flow</h1>
          <p className="text-sm text-neutral-400">Generate prompt & video langsung dari browser (GitHub Pages)</p>
        </div>

        <div className="bg-neutral-900 border border-neutral-800 rounded-2xl p-4">
          <label className="text-xs font-semibold text-neutral-400 uppercase mb-2 block">Anthropic API Key (untuk Generate Prompt)</label>
          <input
            type="password"
            placeholder="sk-ant-xxxxxxxxxxxx"
            value={apiKey}
            onChange={(e) => setApiKey(e.target.value)}
            className="w-full bg-neutral-950 border border-neutral-800 rounded-xl px-4 py-2.5 text-sm text-white placeholder-neutral-600 focus:outline-none focus:border-indigo-500"
          />
          <p className="text-[10px] text-neutral-500 mt-1.5">Key disimpan hanya di browser kamu sendiri (localStorage), tidak dikirim ke server manapun selain Anthropic.</p>
        </div>

        <div className="bg-neutral-900 border border-neutral-800 rounded-2xl p-4">
          <label className="text-xs font-semibold text-neutral-400 uppercase mb-2 block">Ide Utama / Judul</label>
          <input
            type="text"
            placeholder="misal: Robot Samurai Berjalan"
            value={videoTitle}
            onChange={(e) => setVideoTitle(e.target.value)}
            className="w-full bg-neutral-950 border border-neutral-800 rounded-xl px-4 py-2.5 text-sm text-white placeholder-neutral-600 focus:outline-none focus:border-indigo-500"
          />
        </div>

        <div className="bg-neutral-900 border border-neutral-800 rounded-2xl p-4 space-y-4">
          <div>
            <label className="text-xs font-semibold text-neutral-400 uppercase mb-2 block">Orientasi</label>
            <div className="grid grid-cols-3 gap-2">
              {['Horizontal', 'Vertical', 'Square'].map(o => (
                <button key={o} onClick={() => handleOrientationChange(o)}
                  className={`py-2 rounded-lg text-xs font-medium border ${orientation === o ? 'bg-neutral-800 text-white border-neutral-600' : 'bg-neutral-950 text-neutral-500 border-neutral-900'}`}>
                  {o}
                </button>
              ))}
            </div>
          </div>
          <div>
            <label className="text-xs font-semibold text-neutral-400 uppercase mb-2 block">Resolusi</label>
            <div className="flex flex-wrap gap-2">
              {resolutions[orientation].map(r => (
                <button key={r} onClick={() => setResolution(r)}
                  className={`px-3 py-1.5 rounded-lg text-xs border ${resolution === r ? 'bg-indigo-600 text-white border-indigo-500' : 'bg-neutral-950 text-neutral-400 border-neutral-800'}`}>
                  {r}
                </button>
              ))}
            </div>
          </div>
          <div>
            <label className="text-xs font-semibold text-neutral-400 uppercase mb-2 block">FPS</label>
            <div className="flex gap-2">
              {fpsOptions.map(f => (
                <button key={f} onClick={() => setFps(f)}
                  className={`px-3 py-1.5 rounded-lg text-xs border ${fps === f ? 'bg-neutral-700 text-white border-neutral-500' : 'bg-neutral-950 text-neutral-500 border-neutral-900'}`}>
                  {f}
                </button>
              ))}
            </div>
          </div>
          <div>
            <label className="text-xs font-semibold text-neutral-400 uppercase mb-2 flex justify-between">
              <span>Durasi</span><span className="text-white font-mono">{duration}s</span>
            </label>
            <input type="range" min="5" max="30" value={duration} onChange={(e) => setDuration(Number(e.target.value))} className="w-full accent-indigo-500" />
          </div>
        </div>

        <div className="bg-gradient-to-br from-indigo-950/40 to-purple-950/40 border border-purple-500/20 rounded-2xl p-4">
          <div className="flex gap-3">
            <button onClick={handleGeneratePrompt} disabled={isGenerating}
              className="flex-1 bg-indigo-600 hover:bg-indigo-500 disabled:opacity-50 text-white py-3 rounded-xl text-sm font-medium">
              {isGenerating && resultType === 'prompt' ? '⏳ Generating...' : '✨ Generate Prompt'}
            </button>
            <button onClick={handleGenerateVideo} disabled={isGenerating}
              className="flex-1 bg-purple-600 hover:bg-purple-500 disabled:opacity-50 text-white py-3 rounded-xl text-sm font-medium">
              {isGenerating && resultType === 'video' ? '⏳ Rendering...' : '🎬 Generate Video'}
            </button>
          </div>

          {errorText && (
            <div className="mt-3 text-xs text-red-400 bg-red-950/30 border border-red-900/50 rounded-lg p-3">{errorText}</div>
          )}

          {(hasResult || isGenerating) && (
            <div className="mt-4 bg-neutral-950 border border-purple-500/30 rounded-xl p-4">
              <div className="flex justify-between items-center mb-3">
                <span className="text-xs font-semibold text-purple-300">
                  {isGenerating ? 'Memproses...' : 'Hasil'}
                </span>
                {!isGenerating && resultType === 'prompt' && generatedPrompt && (
                  <button onClick={handleCopy} className="text-neutral-400 hover:text-white text-xs">
                    {isCopied ? '✓ Copied' : 'Copy'}
                  </button>
                )}
              </div>

              {isGenerating ? (
                <div className="flex flex-col items-center justify-center h-28 text-purple-400 gap-3">
                  <span className="text-xs font-mono text-purple-300 text-center px-4">{loadingText}</span>
                  <div className="w-32 h-1 bg-neutral-800 rounded-full overflow-hidden">
                    <div className="h-full bg-purple-500 animate-pulse w-full"></div>
                  </div>
                </div>
              ) : resultType === 'video' ? (
                <div className="flex flex-col items-center">
                  <div className={`bg-black rounded-lg border border-neutral-800 overflow-hidden ${getAspectClass()}`}>
                    {videoUrl && <video src={videoUrl} controls loop className="w-full h-full object-cover" />}
                  </div>
                </div>
              ) : (
                <div className="text-sm text-neutral-300 font-mono whitespace-pre-wrap bg-neutral-900/50 p-4 rounded-lg border border-neutral-800">
                  {generatedPrompt}
                </div>
              )}

              {!isGenerating && hasResult && (
                <button onClick={handleDownload}
                  className="w-full mt-3 bg-neutral-800 hover:bg-neutral-700 text-white py-2.5 rounded-lg text-sm font-medium border border-neutral-700">
                  ⬇ Download {resultType === 'video' ? 'Video' : 'Prompt (.txt)'}
                </button>
              )}
            </div>
          )}
        </div>

        <p className="text-[10px] text-neutral-600 text-center pt-2">
          Video di sini adalah motion graphics render browser, bukan AI generatif (Veo/Sora dll) — itu butuh backend server terpisah.
        </p>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
